bookdown::gitbook:
  css: style.css
  config:
    toc:
      before: |
        <li><a href="./">EDA - Población Mundial</a></li>
      after: |
        <li><a href="https://bookdown.org" target="blank">Publicado con bookdown</a></li>
    download: ["pdf", "epub"]
  highlight: tango
bookdown::pdf_book:
  includes:
    in_header: preamble.tex
  latex_engine: xelatex
  citation_package: natbib
  keep_tex: yes
bookdown::epub_book: default
